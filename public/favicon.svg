<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0d0d0d" rx="4"/>

  <!-- Monitor body (outer shell) -->
  <rect x="4" y="5" width="24" height="17" fill="#2a2a2a" rx="2"/>

  <!-- Screen bezel -->
  <rect x="5" y="6" width="22" height="15" fill="#1a1a1a" rx="1"/>

  <!-- Screen glow (green phosphor) -->
  <rect x="6" y="7" width="20" height="13" fill="#0a1f0a" rx="1"/>

  <!-- Scanlines / pixel art content on screen -->
  <!-- Cursor blinking line -->
  <rect x="8"  y="9"  width="6" height="2" fill="#00ff41"/>
  <rect x="8"  y="12" width="10" height="2" fill="#00cc33" opacity="0.8"/>
  <rect x="8"  y="15" width="8"  height="2" fill="#00cc33" opacity="0.6"/>
  <!-- blinking cursor block -->
  <rect x="16" y="9" width="2" height="2" fill="#00ff41"/>

  <!-- Monitor stand neck -->
  <rect x="14" y="22" width="4" height="3" fill="#2a2a2a"/>

  <!-- Monitor base -->
  <rect x="10" y="25" width="12" height="2" fill="#333333" rx="1"/>
</svg>
