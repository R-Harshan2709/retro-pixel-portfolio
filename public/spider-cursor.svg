<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Web strands from center -->
  <g stroke="#cc0000" stroke-width="0.8" opacity="0.9">
    <line x1="16" y1="16" x2="16" y2="1"/>
    <line x1="16" y1="16" x2="16" y2="31"/>
    <line x1="16" y1="16" x2="1"  y2="16"/>
    <line x1="16" y1="16" x2="31" y2="16"/>
    <line x1="16" y1="16" x2="4"  y2="4"/>
    <line x1="16" y1="16" x2="28" y2="4"/>
    <line x1="16" y1="16" x2="4"  y2="28"/>
    <line x1="16" y1="16" x2="28" y2="28"/>
  </g>
  <!-- Web rings -->
  <g stroke="#dd0000" stroke-width="0.7" fill="none" opacity="0.85">
    <polygon points="16,7 21,11 21,21 16,25 11,21 11,11"/>
    <polygon points="16,3 25,8 25,24 16,29 7,24 7,8"/>
  </g>
  <!-- Center glow dot -->
  <circle cx="16" cy="16" r="2.5" fill="#ff2222" opacity="1"/>
  <circle cx="16" cy="16" r="1.2" fill="#ffffff" opacity="0.9"/>
</svg>
